# GitHub Actions workflow: build and publish a pre-built Manifest image
# with the manifest-plugins host pre-installed.
#
# This workflow runs the same pipeline as `pipeline/build-and-publish.sh`
# in CI. The output is a Docker image published to ghcr.io.
#
# Triggers:
#   - workflow_dispatch (manual): run the pipeline on demand with custom
#     parameters (owner, manifest-ref, image-tag).
#   - push tags v*: release a versioned image on every semver tag.
#   - pull_request: build + e2e-validate every PR. Builds the image with
#     push disabled and skips the ghcr.io login so fork PRs (which only
#     get a read-only GITHUB_TOKEN) can run cleanly. Required check for
#     merging.
#
# Image naming:
#   ghcr.io/<owner>/manifest-with-plugins:<tag>
#
# Usage (manual trigger):
#   1. Go to the repo's Actions tab
#   2. Select "Build Manifest image with plugins"
#   3. Click "Run workflow"
#   4. Optionally set inputs (defaults work for most cases):
#      - manifest_ref: a specific mnfst/manifest commit SHA to pin to
#        (default: HEAD of main)
#      - image_tag: a custom tag (default: <manifest-sha> or 'latest')
#      - push: 'true' to push to ghcr.io, 'false' to build only
#   5. The image will appear at:
#      ghcr.io/<owner>/manifest-with-plugins:<image_tag>
#      (where <owner> defaults to ${{ github.repository_owner }})
#
# To pull and run the resulting image:
#   docker pull ghcr.io/<owner>/manifest-with-plugins:<image_tag>
#   docker run --rm -p 3001:3001 \
#     -e DATABASE_URL=... \
#     -e BETTER_AUTH_SECRET=... \
#     ghcr.io/<owner>/manifest-with-plugins:<image_tag>

name: Build Manifest image with plugins

on:
  workflow_dispatch:
    inputs:
      manifest_ref:
        description: "mnfst/manifest git ref to build against (commit SHA, branch, or tag). Default: HEAD of main."
        required: false
        default: ""
        type: string
      manifest_url:
        description: "Git URL to clone when the local manifest path doesn't exist. Default: official mnfst/manifest. Override with a fork URL to test fork-specific Manifest behavior with the plugins."
        required: false
        default: "https://github.com/mnfst/manifest.git"
        type: string
      image_tag:
        description: "Override the image tag. Default: short SHA of the manifest ref, or 'latest' if manifest_ref is empty."
        required: false
        default: ""
        type: string
      push:
        description: "Push the image to ghcr.io. Set to false for build-only dry runs."
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
  push:
    tags:
      - 'v*'
  pull_request:
    # Run on PR open and on every new push to the PR branch.
    # branches-ignore keeps us off the PR's own branch protection noise.
    types:
      - opened
      - synchronize
      - reopened

# Cancel any in-flight builds when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read   # checkout plugins repo + clone mnfst/manifest

jobs:
  build:
    runs-on: ubuntu-latest
    # Job-level permissions: packages: write is required so the
    # `docker push` step can write to ghcr.io/<owner>/manifest-with-plugins.
    # This is safe for fork PRs because:
    #   1. The "Log in to ghcr.io" step has an `if:` that skips on
    #      pull_request events, so no GITHUB_TOKEN-based login happens.
    #   2. The build-and-publish.sh script only calls `docker push` when
    #      `--push` is passed, and the workflow does not pass `--push`
    #      on pull_request (PUSH=false in the case statement).
    # Net effect: PRs from forks still build + e2e-test, never push.
    # workflow_dispatch + tag push get packages: write and can push.
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out plugins repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          # Use the docker-container driver for better caching and
          # layer reuse on repeated runs.
          driver-opts: image=moby/buildkit:v0.13.0

      - name: Log in to ghcr.io
        # Only authenticate when we're actually going to push.
        #   - tag push: always push
        #   - workflow_dispatch: push iff inputs.push == 'true'
        #   - pull_request: never push (token is read-only on forks anyway,
        #     and we don't want PR builds to overwrite tags)
        if: >-
          github.event_name == 'push' ||
          (github.event_name == 'workflow_dispatch' && inputs.push == 'true')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install plugins dependencies
        run: |
          npm install --legacy-peer-deps --no-audit --no-fund

      - name: Materialize private external-plugins config
        # Optional. When the repo owner has private plugins to include in
        # their deploy image (e.g. a private billing-header plugin), they
        # set two secrets on this repo:
        #
        #   EXTERNAL_PLUGINS_LOCAL  — JSON content of external-plugins.local.json
        #                              (same shape as external-plugins.local.example.json)
        #   PLUGINS_PAT             — GitHub PAT with `repo` scope on the
        #                              private plugin repo(s)
        #
        # When BOTH secrets are set, this step writes the local config and
        # exports GIT_TOKEN so the fetch script can clone private repos.
        # When either is missing, this step is a no-op and the build uses
        # only the in-tree plugins (default-policy, header-tier-router,
        # and any committed entries in external-plugins.json).
        #
        # Public forks without these secrets: this step skips silently,
        # the build proceeds with whatever's in the public repo. No access
        # to private repos is ever attempted.
        if: env.EXTERNAL_PLUGINS_LOCAL != '' && env.PLUGINS_PAT != ''
        env:
          EXTERNAL_PLUGINS_LOCAL: ${{ secrets.EXTERNAL_PLUGINS_LOCAL }}
          PLUGINS_PAT: ${{ secrets.PLUGINS_PAT }}
        run: |
          printf '%s' "$EXTERNAL_PLUGINS_LOCAL" > external-plugins.local.json
          echo "::add-mask::$(cat external-plugins.local.json | head -c 100)"
          echo "Wrote external-plugins.local.json (content masked in logs)"
          # GIT_TOKEN is exported into GITHUB_ENV so the subsequent
          # build-and-publish.sh step inherits it.
          echo "GIT_TOKEN=$PLUGINS_PAT" >> "$GITHUB_ENV"

      - name: Run build-and-publish.sh pipeline
        id: pipeline
        # The pipeline script does: clone/refresh mnfst/manifest, build
        # the plugins package, apply the host to all three target files,
        # build the Docker image, smoke-test the host functions, and
        # optionally push to a registry.
        #
        # We pass:
        #   --manifest /tmp/manifest    : explicit manifest path (pipeline
        #                                 will clone fresh mnfst/manifest here
        #                                 if absent)
        #   --tag <image_tag>           : explicit tag if user supplied one
        #   --registry ghcr.io/<owner>  : push destination
        #   --push                       : enable push (unless input said no)
        #   --no-cache                   : fresh build every run (avoid
        #                                 stale-layer surprises)
        env:
          MANIFEST_PATH: /tmp/manifest
        run: |
          ARGS=(
            --manifest /tmp/manifest
            --no-cache
          )
          ARGS+=(--apply-overlay)
          if [ -n "${{ inputs.image_tag }}" ]; then
            ARGS+=(--tag "${{ inputs.image_tag }}")
          fi
          # Decide whether to push to ghcr.io based on the trigger:
          #   - pull_request         → never push (read-only token on forks)
          #   - workflow_dispatch    → push iff inputs.push == 'true'
          #   - push (tag)           → always push
          PUSH=false
          case "${{ github.event_name }}" in
            pull_request)
              PUSH=false
              echo "INFO: pull_request trigger, building without push (e2e-validate only)"
              ;;
            workflow_dispatch)
              if [ "${{ inputs.push }}" = "true" ]; then
                PUSH=true
              else
                echo "WARN: inputs.push = false, building without push"
              fi
              ;;
            push)
              PUSH=true
              ;;
          esac
          if [ "$PUSH" = "true" ]; then
            # Docker registry components (everything before `:`) must be
            # lowercase. GitHub allows mixed-case owner names in the URL
            # path, but the docker CLI rejects them — lowercase explicitly.
            ARGS+=(
              --registry "ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
              --push
            )
          fi
          # For tag-triggered builds, default to v<tag> as the image tag.
          if [ "${{ github.event_name }}" = "push" ] && [ -z "${{ inputs.image_tag }}" ]; then
            TAG="${GITHUB_REF_NAME}"
            ARGS+=(--tag "$TAG")
          fi
          # If a manifest ref is provided, check it out in the manifest
          # clone dir (pipeline will create it via git clone if absent).
          if [ -n "${{ inputs.manifest_ref }}" ]; then
            rm -rf /tmp/manifest
            git clone --depth=1 "https://github.com/mnfst/manifest.git" /tmp/manifest
            (cd /tmp/manifest && git checkout "${{ inputs.manifest_ref }}")
          fi
          # Pass through the manifest URL override. The script's default
          # is already mnfst/manifest; this lets users point at a fork.
          if [ -n "${{ inputs.manifest_url }}" ]; then
            export MANIFEST_URL="${{ inputs.manifest_url }}"
          fi
          # Invoke the script via `bash` (not as `./pipeline/...sh`) so the
          # workflow doesn't depend on the executable bit — git mode handling
          # is platform-fragile (Windows + git on Mac/Linux can disagree on
          # whether the executable bit survives a checkout). The script's
          # shebang is also `/usr/bin/env bash` so this is equivalent.
          bash pipeline/build-and-publish.sh "${ARGS[@]}"

      - name: Summary
        if: always()
        run: |
          echo "## Build summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image owner: \`${{ github.repository_owner }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image name: \`manifest-with-plugins\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Manifest ref: \`${{ inputs.manifest_ref || 'HEAD of main' }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Push: \`${{ github.event_name == 'pull_request' && 'false (PR build)' || inputs.push || 'true (on tag push)' }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Pull and run:" >> "$GITHUB_STEP_SUMMARY"
          echo '```bash' >> "$GITHUB_STEP_SUMMARY"
          echo "docker pull ghcr.io/${{ github.repository_owner }}/manifest-with-plugins:<TAG>" >> "$GITHUB_STEP_SUMMARY"
          echo "docker run --rm -p 3001:3001 ghcr.io/${{ github.repository_owner }}/manifest-with-plugins:<TAG>" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"